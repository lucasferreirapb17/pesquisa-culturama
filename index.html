<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>

<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <main>
        <section id="personal-data">
            <form action="" method="get">
                <fieldset>
                    <legend>Dados Pessoais</legend>
                    <label for="username">Nome:</label>
                    <input type="text" name="username" id="username" placeholder="Nome">
                    <br>
                    <label for="userage">Idade:</label>
                    <input type="number" min="12" max="100" name="userage" id="userage" placeholder="Idade">
                    <br>
                    <label for="birthdate">Data de  Nascimento:</label>
                    <input type="date" name="birthdate" id="birthdate" placeholder="Data de  Nascimento">
                    <br>
                    <label for="usermail">E-mail:</label>
                    <input type="email" name="usermail" id="usermail" placeholder="E-mail">
                    <br>
                    <label for="usertel">Telefone:</label>
                    <input type="tel" name="usertel" id="usertel" pattern="[0-9]{11}" placeholder="Telefone">
                    <br>
                    <label for="userImage">Upload de Foto:</label>
                    <input type="file" accept="image/*"></ipunt>
                </fieldset>

                <!--Perfil-->
                <fieldset>
                    <legend>Perfil</legend>
                    <p>Gênero:</p>
                    <input type="radio" name="gender" id="userGender" value="feminino">
                    <label for="userGender">Feminino</label>
                    <input type="radio" name="gender" id="userGender" value="masculino">
                    <label for="userGender">Masculino</label>
                    <input type="radio" name="gender" id="userGender" value="not-informed">
                    <label for="userGender">Prefiro não informar</label>

                </fieldset>


                <button type="submit">Enviar</button>

            </form>
        </section>
    </main>

    <footer>

    </footer>

</body>

</html>
