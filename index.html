<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>

<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <main>
        <section id="personal-data">
            <form action="" method="get">
                <fieldset>
                    <legend>Dados Pessoais</legend>
                    <label for="username">Nome:</label>
                    <input type="text" name="username" id="username" placeholder="Nome">
                    <br>
                    <label for="userage">Idade:</label>
                    <input type="number" min="12" max="100" name="userage" id="userage" placeholder="Idade">
                    <br>
                    <label for="birthdate">Data de Nascimento:</label>
                    <input type="date" name="birthdate" id="birthdate" placeholder="Data de  Nascimento">
                    <br>
                    <label for="usermail">E-mail:</label>
                    <input type="email" name="usermail" id="usermail" placeholder="E-mail">
                    <br>
                    <label for="usertel">Telefone:</label>
                    <input type="tel" name="usertel" id="usertel" pattern="[0-9]{11}" placeholder="Telefone">
                    <br>
                    <label for="userImage">Upload de Foto:</label>
                    <input type="file" accept="image/*"></ipunt>
                </fieldset>

                <!--Perfil-->
                <fieldset>
                    <legend>Perfil</legend>
                    <p>Gênero:</p>
                    <input type="radio" name="gender" id="userGender" value="feminino">
                    <label for="userGender">Feminino</label>
                    <input type="radio" name="gender" id="userGender" value="masculino">
                    <label for="userGender">Masculino</label>
                    <input type="radio" name="gender" id="userGender" value="not-informed">
                    <label for="userGender">Prefiro não informar</label>
                    <br>
                    <label for="maritalStatus">Estado Civil:</label>
                    <select id="maritalStatus" name="maritalStatus">
                        <option id="maritalStatus" value="not-informed" disabled selected>Selecione</option>
                        <option id="maritalStatus" value="casado">Casado</option>
                        <option id="maritalStatus" value="solteiro">Solteiro</option>
                        <option id="maritalStatus"
                        value="divorciado">Divorciado</option>
                        <option id="maritalStatus" value="viuvo">Viúvo</option>
                        <option id="maritalStatus" value="uniao-estavel">União Estável</option>
                    </select>

                    <label for="userState">Estado:</label>
                    <select name="userState" required>
                        <option value="not-informed" disabled selected>Selecione</option>
                        <option value="AC">Acre</option>
                        <option value="AL">Alagoas</option>
                        <option value="AP">Amapá</option>
                        <option value="AM">Amazonas</option>
                        <option value="BA">Bahia</option>
                        <option value="CE">Ceará</option>
                        <option value="DF">Distrito Federal</option>
                        <option value="ES">Espírito Santo</option>
                        <option value="GO">Goiás</option>
                        <option value="MA">Maranhão</option>
                        <option value="MT">Mato Grosso</option>
                        <option value="MS">Mato Grosso do Sul</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PA">Pará</option>
                        <option value="PB">Paraíba</option>
                        <option value="PR">Paraná</option>
                        <option value="PE">Pernambuco</option>
                        <option value="PI">Piauí</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="RN">Rio Grande do Norte</option>
                        <option value="RS">Rio Grande do Sul</option>
                        <option value="RO">Rondônia</option>
                        <option value="RR">Roraima</option>
                        <option value="SC">Santa Catarina</option>
                        <option value="SP">São Paulo</option>
                        <option value="SE">Sergipe</option>
                        <option value="TO">Tocantins</option>
                    </select>

                    <label for="userCity">Cidade:</label>
                    <input type="text" name="userCity" placeholder="Sua Cidade">

                </fieldset>

                <!--Habitos-->
                <fieldset>
                    <legend>Habitos</legend>
                    <p>Sociais:</p>
                    <input type="checkbox" name="social" value="Instagram">
                    <label for="Instagram">Instagram</label>
                    <br>
                    <input type="checkbox" name="social" value="TikTok">
                    <label for="TikTok">TikTok</label>
                    <br>
                    <input type="checkbox" name="social" value="Facebook">
                    <label for="Facebook">Facebook</label>
                    <br>
                    <input type="checkbox" name="social" value="X">
                    <label for="X">X</label>
                    <br>
                    <input type="checkbox" name="social" value="Outros">
                    <label for="Outros">Outros</label>
                    <br>
                   
                    <label for="music">Gosto musical:</label>
                    <input list="music-list" name="music" id="music" type="text" placeholder="Selecione">
                    <datalist id="music-list">
                        <option value="Rock">
                        <option value="Sertanejo">
                        <option value="Funk">
                        <option value="Pop">
                        <option value="Outros">
                    </datalist>
                    <br>

                    <label for="favoriteColor">Cor Favorita:</label>
                    <input type="color" id="favoriteColor" name="favoriteColor">

                    
                </fieldset>

                <fieldset>
                    <legend>Opinião</legend>
                    <p>O que você acha da qualidade do nosso serviço?</p>
                    <input type="radio" name="satisfaction" id="userSatisfaction" value="otima">
                    <label for="userSatisfaction">Ótima</label>
                    <input type="radio" name="satisfaction" id="userSatisfaction" value="boa">
                    <label for="userSatisfaction">Boa</label>
                    <input type="radio" name="satisfaction" id="userSatisfaction" value="regular">
                    <label for="userSatisfaction">Regular</label>
                    <input type="radio" name="satisfaction" id="userSatisfaction" value="ruim">
                    <label for="userSatisfaction">Ruim</label>
                    <br>

                    <label for="userFeedback">Deixe um feedback:</label>
                    <textarea name="userFeedback" id="userFeedback" placeholder="Digite aqui seu comentário..."></textarea>
                    <br>
                </fieldset>

                <fieldset>
                    <legend>Confirmações</legend>
                    
                    <input type="checkbox" name="userLgpd" id="userLgpdTerm" value="accepted" required>
                    <label for="userLGPD">Eu aceito participar da pesquisa</label>
                    <br>
                    
                    <input type="checkbox" name="userGetResults" id="userGetResults">
                    <label for="userGetResults">Quero receber novidades</label>
                    <br>
                </fieldset>

                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </form>
        </section>
    </main>

    <footer>

    </footer>

</body>

</html>
